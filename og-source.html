<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0b0b0c;
    color: #f0efec;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .glow {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, oklch(0.65 0.22 248 / 0.12) 0%, transparent 65%);
    top: -100px; left: -100px;
  }
  .content {
    position: relative;
    z-index: 2;
    padding: 80px 100px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 56px;
  }
  .wordmark {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #f0efec;
  }
  .divider {
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.15);
    margin: 0 4px;
  }
  .studio-label {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: rgba(240,239,236,0.35);
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 88px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: #f0efec;
    margin-bottom: 36px;
  }
  h1 span { color: oklch(0.65 0.22 248); }
  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    color: rgba(240,239,236,0.45);
    letter-spacing: 0.04em;
  }
  .bottom-row {
    position: absolute;
    bottom: 56px;
    left: 100px;
    right: 100px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .products {
    display: flex;
    gap: 28px;
  }
  .product-pill {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: rgba(240,239,236,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 6px 14px;
    border-radius: 4px;
  }
  .url {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: oklch(0.65 0.22 248 / 0.6);
  }
</style>
</head>
<body>
  <div class="dots"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="logo-row">
      <svg width="28" height="40" viewBox="-3 -3 22 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="0,0 16,0 16,13 0,13 0,26" stroke="oklch(0.65 0.22 248)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
        <circle cx="0"  cy="0"  r="2.8" fill="oklch(0.65 0.22 248)"/>
        <circle cx="16" cy="0"  r="2.8" fill="oklch(0.65 0.22 248)"/>
        <circle cx="16" cy="13" r="2.8" fill="oklch(0.65 0.22 248)"/>
        <circle cx="0"  cy="13" r="2.8" fill="oklch(0.65 0.22 248)"/>
        <circle cx="0"  cy="26" r="2.8" fill="oklch(0.65 0.22 248)"/>
      </svg>
      <span class="wordmark">PixelPath Lab</span>
      <div class="divider"></div>
      <span class="studio-label">Independent Software Studio</span>
    </div>
    <h1>Products,<br>not <span>promises.</span></h1>
    <p class="tagline">Four live products. Philippines. Building for the world.</p>
  </div>
  <div class="bottom-row">
    <div class="products">
      <span class="product-pill">RunMate</span>
      <span class="product-pill">AvatarFlex</span>
      <span class="product-pill">Last Letter</span>
      <span class="product-pill">MakeIntegration</span>
    </div>
    <span class="url">pixelpathlab.com</span>
  </div>
</body>
</html>
